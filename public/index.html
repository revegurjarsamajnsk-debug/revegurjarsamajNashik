<!DOCTYPE html>
<html lang="mr">
<head>
    <script src="/assets/js/analytics.js"></script>
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="iBwcMxlq9sH_BQfFj_tRqie3OShRtxx3KViFXqzaMFw" />
    <meta name="description" content="An online directory to find and connect with members of the Reve Gurjar Samaj community in Nashik.">
    <meta name="keywords" content="reve, gurjar, gujar, samaj, mandal, nashik, community, directory">
    <meta name="author" content="Shreyash Kiran Chaudhari">
    <meta name="robots" content="index, follow">
    
    <meta property="og:title" content="Reve Gurjar Samaj Mandal, Nashik">
    <meta property="og:description" content="The official online directory for the Reve Gurjar Samaj community in Nashik.">
    <meta property="og:image" content="https://revegurjarsamajnashik.vercel.app/assets/images/photo.png">
    <meta property="og:url" content="https://revegurjarsamajnashik.vercel.app">
    <meta property="og:type" content="website">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Reve Gurjar Samaj Mandal, Nashik">
    <meta name="twitter:description" content="The official online directory for the Reve Gurjar Samaj community in Nashik.">
    <meta name="twitter:image" content="https://revegurjarsamajnashik.vercel.app/assets/images/photo.png">
    <meta name="theme-color" content="#FF9933">
    
    <title>Gurjar Mandal - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #333;
            line-height: 1.6;
            background-image: url('assets/images/unity.webp');
            background-size: cover;
            background-repeat: repeat;
            background-attachment: fixed;
            background-position: center;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            z-index: -1;
        }

        /* --- SPLASH SCREEN CSS --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('assets/images/unity.webp'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 99999;
            /* Animation fades out and makes it unclickable so the site underneath works */
            animation: zoomOutFade 2.5s ease-out forwards;
            pointer-events: none; 
        }

        @keyframes zoomOutFade {
            0% { transform: scale(1.5); opacity: 1; }
            70% { opacity: 1; }
            100% { transform: scale(1); opacity: 0; visibility: hidden; }
        }

        /* Header banner */
        .header-banner {
            margin: 3rem auto 1rem;
            max-width: 1000px;
            padding: 0 2rem;
            opacity: 0;
            /* Delayed animation so it appears right as splash screen fades */
            animation: fadeInDown 1s ease 1.5s forwards;
            position: relative;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .banner-container {
            background: linear-gradient(to right, #f8f9fa 0%, #ffffff 50%, #f8f9fa 100%);
            border: 4px solid #c41e3a;
            border-radius: 15px;
            padding: 2rem 3rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Decorative circles */
        .banner-circle {
            width: 25px;
            height: 25px;
            background: #c41e3a;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }

        .circle-left { left: 25px; }
        .circle-right { right: 25px; }

        .banner-text {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 800;
            color: #c41e3a;
            letter-spacing: 2px;
            line-height: 1.2;
            white-space: nowrap;
        }

        /* Content area */
        .content-area {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            min-height: calc(100vh - 300px);
        }

        /* Credits box */
        .credits-box {
            position: absolute;
            bottom: -80px;
            right: -17rem;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #667eea;
            border-radius: 12px;
            padding: 12px 18px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            /* Delayed animation */
            animation: slideIn 1s ease 1.8s forwards;
            max-width: 300px;
            z-index: 100;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .credits-photo {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #667eea;
            flex-shrink: 0;
        }

        .credits-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .credits-label {
            font-size: 0.7rem;
            color: #666;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .credits-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #333;
        }

        .credits-desc {
            font-size: 0.75rem;
            color: #667eea;
            font-weight: 500;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .header-banner {
                margin: 2rem auto;
                padding: 0 1rem;
            }
            .banner-container {
                padding: 1.5rem 2rem;
            }
            .banner-text {
                font-size: 1.2rem;
                letter-spacing: 1px;
            }
            .banner-circle {
                width: 20px;
                height: 20px;
            }
            .circle-left { left: 15px; }
            .circle-right { right: 15px; }

            .credits-box {
                position: static;
                margin: 1rem 1rem 0 auto;
                max-width: 240px;
            }
            .credits-photo {
                width: 40px;
                height: 40px;
            }
            .credits-name { font-size: 0.9rem; }
            .credits-desc { font-size: 0.7rem; }
            
            .image-gallery {
                flex-direction: column;
                align-items: center;
            }
            .image-gallery img {
                width: 100% !important;
            }
        }
    </style>
</head>
<body>

    <div id="splash-screen"></div>

    <div class="header-banner">
        <div class="banner-container">
            <div class="banner-circle circle-left"></div>
            <div class="banner-text">
                रेवे गुजर समाज स्नेहवर्धक मंडळ, नाशिक.
            </div>
            <div class="banner-circle circle-right"></div>
        </div>

        <div class="credits-box">
            <img src="assets/images/developer.jpeg" alt="Developer" class="credits-photo" onerror="this.src='https://via.placeholder.com/100/667eea/ffffff?text=D'">
            <div class="credits-info">
                <div class="credits-label">Website by</div>
                <div class="credits-name">Shreyash Kiran Chaudhari</div>
                <div class="credits-desc">IIT Goa</div>
            </div>
        </div>
    </div>

    <div class="content-area">
        <img 
            src="assets/images/1.jpeg" 
            alt="Mountain landscape"
            class="placed-img"
            style="width: 100%; max-width: 900px; display: block; margin: 0 auto; border-radius: 8px;"
            loading="lazy"
        >
        
        <div class="image-gallery" style="width: 100%; display: flex; gap: 20px; margin-top: 50px; justify-content: center;">
            <img 
                src="assets/images/2.jpeg" 
                alt="First landscape"
                style="flex: 1; max-width: 50%; height: auto; object-fit: cover; border-radius: 8px;"
                loading="lazy"
            >
            <img 
                src="assets/images/3.jpeg" 
                alt="Second landscape"
                style="flex: 1; max-width: 50%; height: auto; object-fit: cover; border-radius: 8px;"
                loading="lazy"
            >
        </div>
    </div>

    <script src="assets/js/sidebar.js"></script>
    <script>
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            if(splash) splash.remove();
        }, 2500);
    </script>
</body>
</html>
