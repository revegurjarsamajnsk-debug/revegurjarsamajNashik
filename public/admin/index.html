<!DOCTYPE html>
<html lang="mr">
<head>
    <link rel="stylesheet" href="../assets/css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Profile Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --font: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
            --black:  #1d1d1f;
            --gray-1: #6e6e73;
            --gray-2: #d2d2d7;
            --gray-3: #f5f5f7;
            --white:  #ffffff;
            --blue:   #0071e3;
            --red:    #ff3b30;
            --radius: 10px;
        }

        body {
            font-family: var(--font);
            background: var(--gray-3);
            color: var(--black);
            min-height: 100vh;
            padding: 2rem 1rem 4rem;
        }

        /* ── Page wrapper ── */
        .admin-container {
            max-width: 760px;
            margin: 0 auto;
        }

        /* ── Top bar ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.75rem;
        }

        .top-bar h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--black);
        }

        .btn-logout {
            padding: 0.45rem 1rem;
            border: 1px solid var(--gray-2);
            border-radius: 8px;
            background: var(--white);
            color: var(--red);
            font-size: 0.82rem;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            transition: background 0.12s, border-color 0.12s;
        }

        .btn-logout:hover { background: #fff2f1; border-color: var(--red); }

        /* ── Card shell ── */
        .card {
            background: var(--white);
            border: 1px solid var(--gray-2);
            border-radius: 14px;
            padding: 1.75rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 1.75rem;
            border-bottom: 1px solid var(--gray-2);
        }

        .tab-btn {
            padding: 0.65rem 1.25rem;
            border: none;
            border-bottom: 2px solid transparent;
            background: transparent;
            cursor: pointer;
            font-size: 0.875rem;
            font-family: var(--font);
            font-weight: 500;
            color: var(--gray-1);
            margin-bottom: -1px;
            transition: color 0.15s, border-color 0.15s;
        }

        .tab-btn.active {
            color: var(--black);
            border-bottom-color: var(--black);
            font-weight: 600;
        }

        .tab-btn:hover:not(.active) { color: var(--black); }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeUp 0.2s ease; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Section title ── */
        .section-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--gray-1);
            margin-bottom: 1.25rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--gray-2);
        }

        /* ── Form ── */
        .form-group { margin-bottom: 1.1rem; }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--black);
            margin-bottom: 0.35rem;
        }

        .form-group input[type="text"],
        .form-group input[type="tel"] {
            width: 100%;
            padding: 0.6rem 0.85rem;
            border: 1px solid var(--gray-2);
            border-radius: 9px;
            font-size: 0.875rem;
            font-family: var(--font);
            background: var(--gray-3);
            color: var(--black);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-group input[type="text"]:focus,
        .form-group input[type="tel"]:focus {
            background: var(--white);
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
        }

        .form-group input[type="file"] {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px dashed var(--gray-2);
            border-radius: 9px;
            font-size: 0.82rem;
            font-family: var(--font);
            background: var(--gray-3);
            color: var(--gray-1);
            cursor: pointer;
        }

        .upload-status {
            margin-top: 0.35rem;
            font-size: 0.78rem;
            color: var(--blue);
            font-weight: 500;
        }

        .image-preview {
            margin-top: 0.75rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .image-preview img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--gray-2);
            background: var(--gray-3);
        }

        /* ── Buttons ── */
        .btn-row {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .btn {
            padding: 0.6rem 1.25rem;
            border-radius: 9px;
            font-size: 0.85rem;
            font-family: var(--font);
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: background 0.12s, border-color 0.12s, transform 0.1s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-primary {
            background: var(--black);
            color: var(--white);
            border-color: var(--black);
        }

        .btn-primary:hover:not(:disabled) { background: #333; }

        .btn-primary:disabled {
            background: var(--gray-2);
            border-color: var(--gray-2);
            color: var(--gray-1);
            cursor: not-allowed;
        }

        .btn-danger {
            background: var(--white);
            color: var(--red);
            border-color: var(--gray-2);
        }

        .btn-danger:hover { background: #fff2f1; border-color: var(--red); }

        .btn-secondary {
            background: var(--white);
            color: var(--black);
            border-color: var(--gray-2);
        }

        .btn-secondary:hover { background: var(--gray-3); }

        /* ── Flash message ── */
        #message {
            display: none;
            padding: 0.75rem 1rem;
            margin-bottom: 1.25rem;
            border-radius: var(--radius);
            font-size: 0.85rem;
            font-weight: 500;
        }

        #message.success {
            background: #f0faf3;
            color: #1a7a3e;
            border: 1px solid #a8d5b5;
        }

        #message.error {
            background: #fff2f1;
            color: var(--red);
            border: 1px solid #ffb3ae;
        }

        /* ── Search ── */
        .search-wrapper { margin-bottom: 1.25rem; }

        .search-wrapper input {
            width: 100%;
            padding: 0.6rem 0.85rem;
            border: 1px solid var(--gray-2);
            border-radius: 9px;
            font-size: 0.875rem;
            font-family: var(--font);
            background: var(--gray-3);
            color: var(--black);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .search-wrapper input:focus {
            background: var(--white);
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
        }

        .search-wrapper input::placeholder { color: var(--gray-1); }

        /* ── Profile list ── */
        .profile-list { display: flex; flex-direction: column; gap: 0.5rem; }

        .profile-card-mini {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.75rem 1rem;
            border: 1px solid var(--gray-2);
            border-radius: var(--radius);
            background: var(--white);
            transition: border-color 0.12s, box-shadow 0.12s;
        }

        .profile-card-mini:hover {
            border-color: #bbb;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .profile-card-mini img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--gray-2);
            background: var(--gray-3);
            flex-shrink: 0;
        }

        .profile-card-mini .info { flex: 1; min-width: 0; }

        .profile-card-mini .info h4 {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--black);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .profile-card-mini .info p {
            font-size: 0.75rem;
            color: var(--gray-1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-edit {
            padding: 0.4rem 0.9rem;
            border: 1px solid var(--gray-2);
            border-radius: 7px;
            background: var(--white);
            color: var(--black);
            font-size: 0.78rem;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.1s;
        }

        .btn-edit:hover { background: var(--gray-3); }

        /* ── Loading ── */
        .loading {
            text-align: center;
            color: var(--gray-1);
            padding: 2.5rem;
            font-size: 0.875rem;
        }

        /* ── Edit form divider ── */
        .edit-section-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--black);
            margin-bottom: 1.25rem;
        }
    </style>
</head>
<body>
    <div class="admin-container">

        <!-- Top bar -->
        <div class="top-bar">
            <h1>Profile Management</h1>
            <button id="logoutButton" class="btn-logout">Logout</button>
        </div>

        <!-- Flash message -->
        <div id="message"></div>

        <!-- Main card -->
        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('add')">Add Profile</button>
                <button class="tab-btn" onclick="showTab('edit')">Edit Profile</button>
            </div>

            <!-- ── ADD TAB ── -->
            <div id="add-tab" class="tab-content active">
                <p class="section-label">New Entry</p>
                <form id="addProfileForm">
                    <div class="form-group">
                        <label>नाव (Name) *</label>
                        <input type="text" name="नाव" placeholder="Enter full name" required>
                    </div>
                    <div class="form-group">
                        <label>मुळगाव (Native Place) *</label>
                        <input type="text" name="मुळगाव" placeholder="e.g. मु.पो. चहार्डी ता. चोपडा" required>
                    </div>
                    <div class="form-group">
                        <label>मोबाईल नंबर (Mobile) *</label>
                        <input type="tel" name="मोबाईल नंबर" placeholder="10-digit number" pattern="[0-9]{10,}" required>
                    </div>
                    <div class="form-group">
                        <label>Area *</label>
                        <input type="text" name="Area" placeholder="e.g. गंगापूर रोड - कॉलेज रोड" required>
                    </div>
                    <div class="form-group">
                        <label>Profile Image</label>
                        <input type="file" id="imageUpload" accept="image/*">
                        <div class="upload-status" id="uploadStatus"></div>
                        <div id="imagePreview" class="image-preview"></div>
                    </div>
                    <div class="btn-row">
                        <button type="submit" class="btn btn-primary" id="addSubmitBtn">Add Profile</button>
                    </div>
                </form>
            </div>

            <!-- ── EDIT TAB ── -->
            <div id="edit-tab" class="tab-content">
                <p class="section-label">Search &amp; Edit</p>

                <div class="search-wrapper" id="searchWrapper">
                    <input type="text" id="searchProfile" placeholder="Search by name, mobile, area, native place…">
                </div>

                <div id="profileList" class="profile-list"></div>

                <!-- Inline edit form -->
                <div id="editForm" style="display:none;">
                    <p class="edit-section-title">Edit Profile</p>
                    <form id="updateProfileForm">
                        <input type="hidden" id="editProfileId">
                        <div class="form-group">
                            <label>नाव (Name) *</label>
                            <input type="text" id="edit-नाव" required>
                        </div>
                        <div class="form-group">
                            <label>मुळगाव (Native Place) *</label>
                            <input type="text" id="edit-मुळगाव" required>
                        </div>
                        <div class="form-group">
                            <label>मोबाईल नंबर (Mobile) *</label>
                            <input type="tel" id="edit-मोबाईल नंबर" pattern="[0-9]{10,}" required>
                        </div>
                        <div class="form-group">
                            <label>Area *</label>
                            <input type="text" id="edit-Area" required>
                        </div>
                        <div class="form-group">
                            <label>Current Image</label>
                            <div class="image-preview">
                                <img id="currentImage" alt="Current profile"
                                     onerror="this.src='https://via.placeholder.com/64?text=?'">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Change Image <span style="color:var(--gray-1);font-weight:400;">(optional)</span></label>
                            <input type="file" id="editImageUpload" accept="image/*">
                            <div class="upload-status" id="editUploadStatus"></div>
                            <div id="editImagePreview" class="image-preview"></div>
                        </div>
                        <div class="btn-row">
                            <button type="submit" class="btn btn-primary" id="updateSubmitBtn">Save Changes</button>
                            <button type="button" onclick="deleteProfile()" class="btn btn-danger">Delete</button>
                            <button type="button" onclick="cancelEdit()" class="btn btn-secondary">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let allProfiles = [];
        let profilesFetched = false;

        function getImageUrl(imagePath) {
            if (!imagePath) return 'https://via.placeholder.com/64?text=?';
            const { data } = supabaseClient.storage.from('profile-images').getPublicUrl(imagePath);
            return data.publicUrl;
        }

        document.addEventListener('DOMContentLoaded', () => {
            supabaseClient.auth.onAuthStateChange((event, session) => {
                if (!session) window.location.href = 'login.html';
            });
            document.getElementById('searchProfile').addEventListener('input', handleSearch);
        });

        document.getElementById('logoutButton').addEventListener('click', async () => {
            const { error } = await supabaseClient.auth.signOut();
            if (error) showMessage('Error logging out: ' + error.message, 'error');
        });

        async function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (tab === 'add') {
                document.getElementById('add-tab').classList.add('active');
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
            } else {
                document.getElementById('edit-tab').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                if (!profilesFetched) await fetchAllProfiles();
            }
        }

        document.getElementById('imageUpload').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('imagePreview').innerHTML = `<img src="${e.target.result}" alt="Preview">`;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('editImageUpload').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('editImagePreview').innerHTML = `<img src="${e.target.result}" alt="Preview">`;
            };
            reader.readAsDataURL(file);
        });

        async function uploadImage(file, statusElementId) {
            if (!file) return null;
            const statusEl = document.getElementById(statusElementId);
            if (statusEl) statusEl.textContent = 'Uploading…';
            if (file.size > 5 * 1024 * 1024) {
                showMessage('Image must be under 5 MB', 'error');
                if (statusEl) statusEl.textContent = '';
                return null;
            }
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.${fileExt}`;
            try {
                const { data, error } = await supabaseClient.storage
                    .from('profile-images')
                    .upload(fileName, file, { cacheControl: '3600', upsert: false });
                if (error) throw error;
                if (statusEl) statusEl.textContent = 'Uploaded ✓';
                setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 2000);
                return data.path;
            } catch (error) {
                showMessage('Upload error: ' + error.message, 'error');
                if (statusEl) statusEl.textContent = '';
                return null;
            }
        }

        async function deleteImage(imagePath) {
            if (!imagePath) return;
            try {
                await supabaseClient.storage.from('profile-images').remove([imagePath]);
            } catch (err) {
                console.error('Image delete error:', err);
            }
        }

        document.getElementById('addProfileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('addSubmitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Adding…';
            const formData = new FormData(e.target);
            const profileData = {};
            formData.forEach((v, k) => profileData[k] = v);
            const imageFile = document.getElementById('imageUpload').files[0];
            if (imageFile) {
                const imagePath = await uploadImage(imageFile, 'uploadStatus');
                if (imagePath) profileData.Image = imagePath;
                else { submitBtn.disabled = false; submitBtn.textContent = 'Add Profile'; return; }
            }
            try {
                const { error } = await supabaseClient.from('profile').insert([profileData]).select();
                if (error) throw error;
                showMessage('Profile added successfully.', 'success');
                e.target.reset();
                document.getElementById('imagePreview').innerHTML = '';
                profilesFetched = false;
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Add Profile';
            }
        });

        async function fetchAllProfiles() {
            const container = document.getElementById('profileList');
            container.innerHTML = '<div class="loading">Loading…</div>';
            try {
                const { data, error } = await supabaseClient.from('profile').select('*').order('Area');
                if (error) throw error;
                allProfiles = data || [];
                profilesFetched = true;
                displayProfiles(allProfiles);
            } catch (error) {
                showMessage('Error fetching profiles: ' + error.message, 'error');
                container.innerHTML = '<p style="text-align:center;color:var(--red);font-size:.85rem;">Failed to load.</p>';
            }
        }

        function handleSearch() {
            if (!profilesFetched) return;
            const q = document.getElementById('searchProfile').value.toLowerCase().trim();
            const filtered = allProfiles.filter(p =>
                (p['नाव']?.toLowerCase().includes(q)) ||
                (p['मोबाईल नंबर']?.includes(q)) ||
                (p['मुळगाव']?.toLowerCase().includes(q)) ||
                (p['Area']?.toLowerCase().includes(q))
            );
            displayProfiles(filtered);
        }

        function displayProfiles(profiles) {
            const container = document.getElementById('profileList');
            container.innerHTML = '';
            if (profiles.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:var(--gray-1);font-size:.85rem;padding:2rem 0;">No profiles found.</p>';
                return;
            }
            profiles.forEach(profile => {
                const card = document.createElement('div');
                card.className = 'profile-card-mini';
                card.innerHTML = `
                    <img src="${getImageUrl(profile.Image)}" alt="${profile['नाव']}"
                         onerror="this.src='https://via.placeholder.com/44?text=?'">
                    <div class="info">
                        <h4>${profile['नाव']}</h4>
                        <p>${profile['मुळगाव']} · ${profile['मोबाईल नंबर']}</p>
                    </div>
                    <button class="btn-edit" onclick="editProfile(${profile.id})">Edit</button>
                `;
                container.appendChild(card);
            });
        }

        async function editProfile(id) {
            const profileData = allProfiles.find(p => p.id === id);
            if (!profileData) { showMessage('Profile not found.', 'error'); return; }
            document.getElementById('editProfileId').value = profileData.id;
            document.getElementById('edit-नाव').value = profileData['नाव'];
            document.getElementById('edit-मुळगाव').value = profileData['मुळगाव'];
            document.getElementById('edit-मोबाईल नंबर').value = profileData['मोबाईल नंबर'];
            document.getElementById('edit-Area').value = profileData.Area;
            document.getElementById('currentImage').src = getImageUrl(profileData.Image);
            document.getElementById('profileList').style.display = 'none';
            document.getElementById('searchWrapper').style.display = 'none';
            document.getElementById('editForm').style.display = 'block';
        }

        document.getElementById('updateProfileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('updateSubmitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving…';
            const id = document.getElementById('editProfileId').value;
            const oldProfile = allProfiles.find(p => p.id == id);
            const profileData = {
                'नाव': document.getElementById('edit-नाव').value,
                'मुळगाव': document.getElementById('edit-मुळगाव').value,
                'मोबाईल नंबर': document.getElementById('edit-मोबाईल नंबर').value,
                'Area': document.getElementById('edit-Area').value
            };
            const imageFile = document.getElementById('editImageUpload').files[0];
            if (imageFile) {
                const imagePath = await uploadImage(imageFile, 'editUploadStatus');
                if (imagePath) {
                    profileData.Image = imagePath;
                    if (oldProfile?.Image) await deleteImage(oldProfile.Image);
                } else {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Save Changes';
                    return;
                }
            }
            try {
                const { error } = await supabaseClient.from('profile').update(profileData).eq('id', id);
                if (error) throw error;
                showMessage('Profile updated.', 'success');
                profilesFetched = false;
                cancelEdit();
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Save Changes';
            }
        });

        async function deleteProfile() {
            if (!confirm('Delete this profile? This cannot be undone.')) return;
            const id = document.getElementById('editProfileId').value;
            const profileToDelete = allProfiles.find(p => p.id == id);
            try {
                const { error } = await supabaseClient.from('profile').delete().eq('id', id);
                if (error) throw error;
                if (profileToDelete?.Image) await deleteImage(profileToDelete.Image);
                showMessage('Profile deleted.', 'success');
                profilesFetched = false;
                cancelEdit();
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        function cancelEdit() {
            document.getElementById('editForm').style.display = 'none';
            document.getElementById('profileList').style.display = 'flex';
            document.getElementById('searchWrapper').style.display = 'block';
            document.getElementById('editImagePreview').innerHTML = '';
            document.getElementById('editImageUpload').value = '';
            if (!profilesFetched) fetchAllProfiles();
            else handleSearch();
        }

        function showMessage(msg, type) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = type;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }
    </script>
</body>
</html>
